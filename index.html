<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同齊咖吡 - Together Coffee Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --brand-blue: #223843;
            --font-serif: "Noto Serif TC", serif;
            --font-sans: "Noto Sans TC", sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            color: #2c2c2c;
            background-color: #faf8f5;
            overflow-x: hidden;
            cursor: none;
        }

        html {
            scroll-behavior: smooth;
        }

        /* Custom Cursor */
        #custom-cursor {
            width: 22px;
            height: 22px;
            background: rgba(76, 106, 146, 0.15);
            border: 1px solid var(--brand-blue);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease, opacity 0.15s ease;
            transform: translate(-50%, -50%);
            opacity: 0;
        }

        #custom-cursor.active {
            opacity: 1;
        }

        #custom-cursor.hover {
            transform: translate(-50%, -50%) scale(1.5);
            background: rgba(76, 106, 146, 0.25);
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(250, 248, 245, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(76, 106, 146, 0.1);
        }

        .logo {
            display: block;
            height: 90px;
            text-decoration: none;
        }

        .logo img {
            height: 100%;
            width: auto;
            object-fit: contain;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        .nav-links a {
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 700;
            color: #2c2c2c;
            text-decoration: none;
            transition: color 0.3s ease;
            letter-spacing: 1px;
        }

        .nav-links a span {
            color: var(--brand-blue);
            margin-right: 8px;
            font-weight: 700;
        }

        .nav-links a:hover {
            color: var(--brand-blue);
        }

        /* Mobile Menu */
        .mobile-menu {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .mobile-menu span {
            width: 25px;
            height: 2px;
            background: var(--brand-blue);
            transition: all 0.3s ease;
        }

        /* Background Carousel */
        .同齊咖吡index {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        .slide::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
        }

        .slide-1 {
            background-image: url('https://api.kuse.ai/api/folder/v1/file/3d6c9b80c050b312a7125ba3aa04a4c5fde7937537280bc29854d1b8629b0930_2121211.jpg');
        }

        .slide-2 {
            background-image: url('https://api.kuse.ai/api/folder/v1/file/8140b19289acfcc1c6bcdd9882e2a192aa49861bc97351871ac3acbe1a2f9681_2121234.jpg');
        }

        .slide-3 {
            background-image: url('https://api.kuse.ai/api/folder/v1/file/4fb0e9bebccc57a73bca8615e7e8af1bf2c545485ba96cfdd1ac51d4ac008385_2121350.jpg');
        }

        /* Hero Content */
        .hero-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            color: white;
            width: 90%;
            max-width: 800px;
        }

        .serif-italic {
            font-family: 'Noto Serif TC', serif;
            font-style: italic;
            font-size: 18px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 1px;
        }

        .main-title {
            font-family: 'Noto Serif TC', serif;
            font-weight: 900;
            font-size: 56px;
            line-height: 1.3;
            margin-bottom: 40px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .hero-btns {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary,
        .btn-secondary {
            padding: 16px 40px;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            display: inline-block;
        }

        .btn-primary {
            background: var(--brand-blue);
            color: white;
            border: 2px solid var(--brand-blue);
        }

        .btn-primary:hover {
            background: #3d5573;
            border-color: #3d5573;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(76, 106, 146, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid white;
        }

        .btn-secondary:hover {
            background: white;
            color: var(--brand-blue);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.3);
        }

        /* News Panel */
        .news-panel {
            position: fixed;
            top: 50%;
            right: 40px;
            transform: translateY(-50%);
            z-index: 100;
            background: rgba(250, 248, 245, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 380px;
            max-height: 500px;
            overflow-y: auto;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .news-panel.hidden {
            opacity: 0;
            transform: translateY(-50%) translateX(100px);
            pointer-events: none;
        }

        .news-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .news-panel h2 {
            font-family: var(--font-sans);
            font-size: 2rem;
            font-weight: 900;
            color: #2c2c2c;
            letter-spacing: 2px;
            margin: 0;
        }

        .news-close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #999;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease;
            line-height: 1;
        }

        .news-close-btn:hover {
            color: #2c2c2c;
        }

        .news-item {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(44, 44, 44, 0.1);
        }

        .news-item:last-of-type {
            border-bottom: none;
            margin-bottom: 20px;
            padding-bottom: 0;
        }

        .news-date {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .news-title {
            font-size: 1rem;
            color: #2c2c2c;
            line-height: 1.6;
            font-weight: 400;
        }

        .news-more {
            display: inline-block;
            font-size: 1.1rem;
            font-weight: 700;
            color: #2c2c2c;
            text-decoration: none;
            border-bottom: 2px solid #2c2c2c;
            padding-bottom: 2px;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .news-more:hover {
            color: var(--brand-blue);
            border-bottom-color: var(--brand-blue);
        }

        /* Footer */
        footer {
            background: #1a1a1a;
            color: white;
            padding: 40px 60px;
            text-align: center;
        }

        .social-links {
            font-size: 16px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .copyright {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .navbar {
                padding: 16px 24px;
            }

            .nav-links {
                display: none;
            }

            .mobile-menu {
                display: flex;
            }

            .nav-links.mobile-active {
                display: flex;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                right: 0;
                background: rgba(255, 255, 255, 0.98);
                padding: 30px;
                gap: 20px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            }

            .main-title {
                font-size: 36px;
            }

            .serif-italic {
                font-size: 14px;
            }

            .hero-btns {
                flex-direction: column;
                align-items: center;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
                max-width: 280px;
            }

            footer {
                padding: 30px 24px;
            }

            .news-panel {
                position: static;
                transform: none;
                right: auto;
                width: 100%;
                margin: 20px;
                max-height: none;
            }

            body {
                cursor: auto;
            }

            #custom-cursor {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>

    <nav class="navbar">
        <a href="index.html" class="logo"><img src="https://api.kuse.ai/api/folder/v1/file/9d637fe0931f19554fba54df05da1ae9e0c2c89d44b3e656eedba1729d226de2_2536607.png" alt="同齊咖吡"></a>
        <div class="nav-links">

        <div class="slide slide-1 active"></div>

        <div class="news-item">

        </div>
        <a href="news.html" class="news-more">MORE</a>
    </div>

    <footer>
        <div class="social-links">FB | IG | LINE</div>
        <div class="copyright">© 2026 TOGETHER COFFEE PROJECT.</div>

            <span>made with</span>
            <a href="https://kuse.ai" target="_blank" style="display: flex; align-items: center; text-decoration: none; color: inherit; transition: color 0.3s ease;">

                    <path fill-rule="evenodd" clip-rule="evenodd" d="m146.76,7.94c8.07,0,13.24,6.15,13.24,14.58v1.39h-20.75c.45,4.05,3.51,7.37,8.57,7.37,2.62,0,5.73-1.05,7.62-2.94l2.67,3.83c-2.67,2.55-6.62,3.88-10.9,3.88-8.07,0-14.08-5.6-14.08-14.08,0-7.76,5.67-14.02,13.63-14.02zm0,4.77c-5.01,0-7.29,3.83-7.57,7.1h15.13c-.11-3.16-2.28-7.1-7.57-7.1z" fill="currentColor"/>

    <script>
        // Custom Cursor
        const cursor = document.getElementById(`custom-cursor`);
        const links = document.querySelectorAll(`a, button, .mobile-menu`);

        document.addEventListener(`mousemove`, (e) => {
            cursor.style.left = e.clientX + `px`;
            cursor.style.top = e.clientY + `px`;
            cursor.classList.add(`active`);
        });

        document.addEventListener(`mouseleave`, () => {
            cursor.classList.remove(`active`);
        });

        links.forEach(link => {
            link.addEventListener(`mouseenter`, () => {
                cursor.classList.add(`hover`);
            });
            link.addEventListener(`mouseleave`, () => {
                cursor.classList.remove(`hover`);
            });
        });

        // Mobile Menu Toggle
        const mobileMenuBtn = document.querySelector(`.mobile-menu`);
        const navLinks = document.querySelector(`.nav-links`);

        mobileMenuBtn.addEventListener(`click`, () => {
            navLinks.classList.toggle(`mobile-active`);
        });

        // Background Carousel
        const slides = document.querySelectorAll(`.slide`);
        let currentSlide = 0;

        function nextSlide() {
            slides[currentSlide].classList.remove(`active`);
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add(`active`);
        }

        setInterval(nextSlide, 5000);

        // Kuse Branding Hover Effect
        const kuseBranding = document.querySelector(`.kuse-branding`);
        kuseBranding.addEventListener(`mouseenter`, () => {
            kuseBranding.style.color = `rgba(255,255,255,0.8)`;
        });
        kuseBranding.addEventListener(`mouseleave`, () => {
            kuseBranding.style.color = `rgba(255,255,255,0.5)`;
        });
        kuseBranding.addEventListener(`click`, () => {
            window.open(`https://kuse.ai`, `_blank`);
        });

        // News Panel Close Button
        const newsPanel = document.getElementById(`newsPanel`);
        const newsCloseBtn = document.getElementById(`newsCloseBtn`);
        
        newsCloseBtn.addEventListener(`click`, () => {
            newsPanel.classList.add(`hidden`);
        });
    </script>
    <script src="https://cdn.kuse.ai/sdk.prd.js"></script>
</body>
</html>
