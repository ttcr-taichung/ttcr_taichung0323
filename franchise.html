<html lang="zh-TW"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加盟計畫 - 同齊咖吡</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&amp;family=Noto+Serif+TC:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --brand-blue: #4C6A92;
            --border-color: #E8E8E8;
            --font-serif: "Noto Serif TC", serif;
            --font-sans: "Noto Sans TC", sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            color: #202020;
            background: #FEFEFE;
            overflow-x: hidden;
        }

        #custom-cursor {
            width: 22px;
            height: 22px;
            background: rgba(76, 106, 146, 0.15);
            border: 1px solid var(--brand-blue);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background 0.2s;
        }

        #custom-cursor.hover {
            width: 40px;
            height: 40px;
            background: rgba(76, 106, 146, 0.25);
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(254, 254, 254, 0.95);
            backdrop-filter: blur(10px);
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--brand-blue);
            text-decoration: none;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            font-family: var(--font-sans);
            font-size: 0.9rem;
            color: #202020;
            text-decoration: none;
            font-weight: 500;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .nav-links a span {
            color: var(--brand-blue);
            font-size: 0.75rem;
            margin-right: 8px;
        }

        .nav-links a:hover {
            color: var(--brand-blue);
        }

        .nav-links a.active {
            color: var(--brand-blue);
            font-weight: 700;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            padding: 5px;
        }

        .hamburger span {
            width: 25px;
            height: 2px;
            background: var(--brand-blue);
            transition: all 0.3s;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(7px, 7px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        .main-content {
            padding: 150px 0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .menu-cat-title {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 500;
            color: #999;
            letter-spacing: 3px;
            margin-bottom: 60px;
            text-transform: uppercase;
        }

        .content-wrapper {
            display: flex;
            gap: 100px;
            align-items: flex-start;
        }

        .left-column {
            flex: 1;
        }

        .left-column h2 {
            font-family: var(--font-serif);
            color: var(--brand-blue);
            font-size: 1.8rem;
            line-height: 1.6;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .left-column p {
            color: #666;
            font-family: var(--font-serif);
            line-height: 1.8;
            font-size: 1rem;
        }

        .right-column {
            flex: 1;
        }

        .franchise-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .franchise-form input,
        .franchise-form textarea {
            padding: 15px;
            border: 1px solid var(--border-color);
            outline: none;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            transition: border-color 0.3s;
            background: #FEFEFE;
        }

        .franchise-form input:focus,
        .franchise-form textarea:focus {
            border-color: var(--brand-blue);
        }

        .franchise-form textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            background: var(--brand-blue);
            color: #fff;
            padding: 15px;
            border: none;
            font-weight: 700;
            letter-spacing: 2px;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            transition: all 0.3s;
            border: 2px solid var(--brand-blue);
        }

        .submit-btn:hover {
            background: transparent;
            color: var(--brand-blue);
        }

        footer {
            background: #F8F8F8;
            padding: 40px 50px;
            text-align: center;
            border-top: 1px solid var(--border-color);
        }

        .social-links {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            color: #999;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .copyright {
            font-family: var(--font-sans);
            font-size: 0.75rem;
            color: #BBBBBB;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 20px 25px;
            }

            .nav-links {
                position: fixed;
                top: 70px;
                left: 0;
                right: 0;
                background: rgba(254, 254, 254, 0.98);
                flex-direction: column;
                gap: 0;
                padding: 0;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s;
                border-bottom: 1px solid var(--border-color);
            }

            .nav-links.active {
                max-height: 300px;
            }

            .nav-links a {
                padding: 20px 25px;
                border-bottom: 1px solid var(--border-color);
            }

            .hamburger {
                display: flex;
            }

            .main-content {
                padding: 100px 0 80px 0;
            }

            .container {
                padding: 0 25px;
            }

            .content-wrapper {
                flex-direction: column;
                gap: 50px;
            }

            .left-column h2 {
                font-size: 1.5rem;
            }

            .menu-cat-title {
                margin-bottom: 40px;
            }

            footer {
                padding: 30px 25px;
            }
        }

        @media print {
            @page {
                size: auto;
                margin: 20mm 25mm;
            }

            body {
                margin: 0;
                padding: 0;
                background: white;
            }

            .navbar,
            footer,
            #custom-cursor {
                display: none !important;
            }

            .main-content {
                padding: 20px 0;
            }
        }
    </style>

    <script>
        const cursor = document.getElementById(`custom-cursor`);
        const hamburger = document.querySelector(`.hamburger`);
        const navLinks = document.querySelector(`.nav-links`);
        const form = document.querySelector(`.franchise-form`);

        document.addEventListener(`mousemove`, (e) => {
            cursor.style.left = e.clientX + `px`;
            cursor.style.top = e.clientY + `px`;
        });

        const hoverElements = document.querySelectorAll(`a, button, input, textarea`);
        hoverElements.forEach(element => {
            element.addEventListener(`mouseenter`, () => {
                cursor.classList.add(`hover`);
            });
            element.addEventListener(`mouseleave`, () => {
                cursor.classList.remove(`hover`);
            });
        });

        hamburger.addEventListener(`click`, () => {
            hamburger.classList.toggle(`active`);
            navLinks.classList.toggle(`active`);
        });

        form.addEventListener(`submit`, (e) => {
            e.preventDefault();
            alert(`感謝您的申請！我們會盡快與您聯繫。`);
            form.reset();
        });

        document.addEventListener(`click`, (e) => {
            if (!hamburger.contains(e.target) && !navLinks.contains(e.target)) {
                hamburger.classList.remove(`active`);
                navLinks.classList.remove(`active`);
            }
        });
    </script>
