    <style>
        :root {
            --brand-blue: #223843;
            --brand-blue-light: rgba(34, 56, 67, 0.15);
            --font-serif: "Noto Serif TC", serif;
            --font-sans: "Noto Sans TC", sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background: #faf8f5;
            color: #2c2c2c;
            cursor: none;
            overflow-x: hidden;
        }

        #custom-cursor {
            width: 22px;
            height: 22px;
            background: rgba(76, 106, 146, 0.15);
            border: 1px solid var(--brand-blue);
            border-radius: 50% !important;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            transform: translate(-50%, -50%);
        }

        #custom-cursor.hover {
            transform: translate(-50%, -50%) scale(1.5);
            background: rgba(76, 106, 146, 0.25);
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(250, 248, 245, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(76, 106, 146, 0.1);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: block;
            height: 90px;
            text-decoration: none;
        }

        .logo img {
            height: 100%;
            width: auto;
            object-fit: contain;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        .nav-links a {
            font-size: 0.95rem;
            font-weight: 700;
            color: #2c2c2c;
            text-decoration: none;
            letter-spacing: 1px;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--brand-blue);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a.active {
            color: var(--brand-blue);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: none;
        }

        .hamburger span {
            width: 25px;
            height: 2px;
            background: var(--brand-blue);
            transition: all 0.3s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(7px, 7px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        .hero-section {
            margin-top: 80px;
            padding: 6rem 2rem 4rem;
            text-align: center;
            background: linear-gradient(180deg, var(--brand-blue-light) 0%, transparent 100%);
        }

        .page-number {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--brand-blue);
            letter-spacing: 3px;
            margin-bottom: 1rem;
        }

        .page-title {
            font-family: var(--font-serif);
            font-size: 3rem;
            font-weight: 900;
            color: var(--brand-blue);
            letter-spacing: 5px;
            margin: 0.5rem 0;
        }

        .page-subtitle {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            font-weight: 400;
            color: #5C5C5C;
            letter-spacing: 0.1em;
        }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 4rem 2rem 6rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(76, 106, 146, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(76, 106, 146, 0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.08);
        }

        .gallery-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem 1.5rem;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            color: white;
            font-family: 'Noto Serif TC', serif;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            transform: translateY(100%);
            transition: transform 0.4s ease;
        }

        .gallery-item:hover .gallery-caption {
            transform: translateY(0);
        }

        footer {
            background: var(--brand-blue);
            color: white;
            padding: 3rem 5%;
            text-align: center;
        }

        .social-links {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            letter-spacing: 3px;
        }

        .copyright {
            font-size: 0.9rem;
            opacity: 0.8;
            opacity: 0.8;
            letter-spacing: 0.05em;
        }

        @media (max-width: 1024px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }

            .page-title {
                font-size: 3rem;
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 70%;
                height: 100vh;
                background: rgba(250, 250, 248, 0.98);
                backdrop-filter: blur(10px);
                flex-direction: column;
                padding: 6rem 2rem 2rem;
                gap: 2rem;
                transition: right 0.3s ease;
                box-shadow: -4px 0 20px rgba(0, 0, 0, 0.1);
            }

            .nav-links.active {
                right: 0;
            }

            .hamburger {
                display: flex;
                z-index: 1001;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .page-title {
                font-size: 2.5rem;
            }

            .page-subtitle {
                font-size: 1rem;
            }

            .hero-section {
                padding: 4rem 1.5rem 3rem;
            }

            .gallery-container {
                padding: 3rem 1.5rem 4rem;
            }
        }

        @media (max-width: 480px) {
            .page-title {
                font-size: 2rem;
            }

            .nav-container {
                padding: 1rem 1.5rem;
            }

            .logo {
                font-size: 1.2rem;
            }
        }

                        /* Footer */
        .footer {
            background: #223843;
            color: #fff;
            padding: 3rem 2rem 2rem;

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .footer .social-links {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .footer .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #fff;
            color: #2c3e50;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .footer .social-links a:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .footer .social-links a svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .footer-text {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 0;

    <script>
        const cursor = document.getElementById(`custom-cursor`);
        const hoverElements = document.querySelectorAll(`a, button, .gallery-item`);

        document.addEventListener(`mousemove`, (e) => {
            cursor.style.left = e.clientX + `px`;
            cursor.style.top = e.clientY + `px`;
        });

        hoverElements.forEach(element => {
            element.addEventListener(`mouseenter`, () => {
                cursor.classList.add(`hover`);
            });
            element.addEventListener(`mouseleave`, () => {
                cursor.classList.remove(`hover`);
            });
        });

        const hamburger = document.querySelector(`.hamburger`);
        const navLinks = document.querySelector(`.nav-links`);

        hamburger.addEventListener(`click`, () => {
            hamburger.classList.toggle(`active`);
            navLinks.classList.toggle(`active`);
        });

        navLinks.querySelectorAll(`a`).forEach(link => {
            link.addEventListener(`click`, () => {
                hamburger.classList.remove(`active`);
                navLinks.classList.remove(`active`);
            });
        });
